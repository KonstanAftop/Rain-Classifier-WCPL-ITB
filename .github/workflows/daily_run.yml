name: Run Script Daily

on:
  schedule:
    - cron: "0 10 * * *"  # Runs every day at 10:00 UTC
  workflow_dispatch:  # Allows manual triggering

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      # Update ke v4.2.2 atau lebih baru (biasanya @v4 merujuk ke yang terbaru)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Update ke v5 untuk dukungan Node.js yang lebih baru
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install opencv-python requests

      - name: Run the script
        run: python main.py

      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions[bot]"
          git add .
          git commit -m "Automated update from GitHub Actions" || echo "No changes to commit"
          git push origin main
